services:
  # Our Backend (Python Flask App)
  web:
    build: .
    container_name: flask_app
    # CyberSec check: We REMOVED "5000:5000" from host ports. 
    # Now app is hidden inside Docker network and only accessible by Nginx.
    expose:
      - "5000"
    environment:
      - DB_HOST=db
      - DB_NAME=devops_db
      - DB_USER=postgres
      - DB_PASSWORD=my_secure_password_2026
    depends_on:
      - db
    networks:
      - app_network

  # Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=devops_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=my_secure_password_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  # Reverse Proxy & Web Server (Nginx)
  gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"  # Standard HTTP port open to the world
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
  nginx_logs:  # Persistent storage for logs to parse them later